<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>TrufusionLabs Password Reset</title>
</head>
<body style="margin:0; padding:0; background:#ffffff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Inter,Helvetica,Arial,sans-serif;">
  <div style="max-width:560px; margin:0 auto; padding:32px 16px; background:#ffffff;">
    <div style="background:#ffffff; border:1px solid #e2e8f0; border-radius:28px; corner-shape:squircle; overflow:hidden; padding:22px;">
      <div style="text-align:center; margin:0 0 18px;">
        <img src="{{logoUrl}}" width="360" alt="TrufusionLabs" style="width:360px; max-width:70%; height:auto; display:block; margin:0 auto; border:0; outline:none; text-decoration:none;" />
      </div>
      <p style="margin:0 0 16px; color:#334155; line-height:1.6;">You requested a password reset. Click the link below to reset your password.</p>
      <a href="{{resetUrl}}" style="display:inline-block; padding:12px 18px; background-color:#0B0679; background-image:linear-gradient(#0B0679,#0B0679); color:#ffffff; -webkit-text-fill-color:#ffffff; border-radius:12px; text-decoration:none; font-weight:700;">Reset Password</a>
    </div>
  </div>
</body>
</html>

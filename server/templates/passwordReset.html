<!DOCTYPE html>
<html>
<head>
  <title>Password Reset</title>
</head>
<body style="margin:0; padding:0; background:rgb(55,126,186); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Inter,Helvetica,Arial,sans-serif;">
  <div style="max-width:560px; margin:0 auto; padding:32px 14px; background:rgb(55,126,186);">
    <div style="background:#ffffff; border:1px solid rgba(255,255,255,0.82); border-radius:14px; padding:22px;">
      <p style="margin:0 0 16px; color:#334155; line-height:1.6;">You requested a password reset. Click the link below to reset your password.</p>
      <a href="{{resetUrl}}" style="display:inline-block; padding:12px 18px; background:#0B0679; color:#ffffff; border-radius:12px; text-decoration:none; font-weight:700;">Reset Password</a>
    </div>
  </div>
</body>
</html>

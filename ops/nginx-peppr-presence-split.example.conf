# Place these exact-match locations before the generic `/api/` proxy block.
# This example assumes the main API upstream is already on 127.0.0.1:8000 and
# the dedicated presence service is bound on 127.0.0.1:8001.

upstream peppr_api_main {
    server 127.0.0.1:8000;
    keepalive 32;
}

upstream peppr_api_presence {
    server 127.0.0.1:8001;
    keepalive 32;
}

location = /api/settings/presence {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    proxy_pass http://peppr_api_presence;
}


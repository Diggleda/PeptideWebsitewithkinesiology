<!DOCTYPE html>
<html lang="en">
  <head><meta charset="utf-8" /><title>New TrufusionLabs Product Release</title></head>
  <body style="margin:0;background:#ffffff;color:#111827;font-family:Arial,Helvetica,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#ffffff;">
      <tr><td align="center" style="padding:24px;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:640px;border:1px solid #E5E7EB;border-radius:28px;corner-shape:squircle;overflow:hidden;">
          <tr><td align="center" style="padding:24px 24px 0;"><img src="cid:trufusion-logo" width="320" alt="TrufusionLabs" style="max-width:70%;height:auto;border:0;" /></td></tr>
          <tr><td style="padding:32px;">
            <p style="margin:0 0 8px;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#0B0679;">PRODUCT RELEASE</p>
            <h1 style="margin:0 0 14px;font-size:28px;line-height:1.2;color:#0B274B;">New product release</h1>
            <p style="margin:0 0 18px;font-size:16px;line-height:1.55;color:#334155;">Hi {{ doctor_name }}, a new TrufusionLabs product update is available for {{ clinic_name }}.</p>
            <p style="margin:0 0 24px;font-size:15px;line-height:1.6;color:#334155;">Final campaign copy can be added by developers in this approved template before production use.</p>
            <p style="margin:0;font-size:12px;color:#6b7280;">Questions? Contact <a href="mailto:{{ support_email }}" style="color:#0B0679;text-decoration:none;">{{ support_email }}</a>. <a href="{{ unsubscribe_url }}" style="color:#0B0679;text-decoration:none;">Unsubscribe</a>.</p>
          </td></tr>
        </table>
      </td></tr>
    </table>
  </body>
</html>

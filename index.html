    <meta property="og:url" content="https://trufusionlabs.com/" />

    <meta
      property="og:description"
      content="A secure physician-focused platform for peptide education, research resources, product information, events, and compliance-minded practice tools."
    />
    <meta property="og:image" content="https://trufusionlabs.com/og-image.jpg" />
    <meta property="og:image:secure_url" content="https://trufusionlabs.com/og-image.jpg" />
    <meta property="og:image:type" content="image/jpeg" />

    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TruFusionLabs | Physician Peptide Research Platform" />
    <meta
      name="twitter:description"
      content="A secure physician-focused platform for peptide education, research resources, product information, events, and compliance-minded practice tools."
    />
    <meta name="twitter:image" content="https://trufusionlabs.com/og-image.jpg" />
    <meta name="twitter:image:alt" content="TruFusionLabs" />

    <!-- iOS / PWA -->
    <meta name="application-name" content="TruFusionLabs" />
    <meta name="apple-mobile-web-app-title" content="TruFusionLabs" />
    <meta name="theme-color" content="#0B0679" />

    <script>
      (() => {
        try {
          const ensureHeadLink = (selector, attrs) => {
            const head = document.head || document.querySelector("head");
            if (!head) return;
            let link = document.querySelector(selector);
            if (!link) {
              link = document.createElement("link");
              head.appendChild(link);
            }
            Object.entries(attrs).forEach(([key, value]) => {
              if (typeof value === "string") link.setAttribute(key, value);
            });
          };

          const themeColor = document.querySelector('meta[name="theme-color"]');
          if (themeColor) themeColor.setAttribute("content", "#0B0679");
          document.documentElement.dataset.brandColor = "blue";
          document.documentElement.style.setProperty("--primary", "rgb(11, 6, 121)");
          document.documentElement.style.setProperty("--primary-foreground", "#ffffff");
          document.documentElement.style.setProperty("--brand-color", "rgb(11, 6, 121)");
          document.documentElement.style.setProperty("--brand-color-rgb", "11, 6, 121");
          document.documentElement.style.setProperty("--brand-glass-rgb", "11, 6, 121");
          document.documentElement.style.setProperty("--secondary", "rgb(11, 6, 121)");
          document.documentElement.style.setProperty("--secondary-foreground", "#ffffff");

          const title = "TruFusionLabs | Physician Peptide Research Platform";
          const appTitle = "TruFusionLabs";
          document.title = title;

          const appName = document.querySelector('meta[name="application-name"]');
          if (appName) appName.setAttribute("content", appTitle);
          const appleTitle = document.querySelector('meta[name="apple-mobile-web-app-title"]');
          if (appleTitle) appleTitle.setAttribute("content", appTitle);

          const ogTitle = document.querySelector('meta[property="og:title"]');
          const twTitle = document.querySelector('meta[name="twitter:title"], meta[property="twitter:title"]');
          if (ogTitle) ogTitle.setAttribute("content", title);
          if (twTitle) twTitle.setAttribute("content", title);
        } catch (e) {
          // ignore
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

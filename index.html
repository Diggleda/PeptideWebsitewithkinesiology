<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Physician Portal</title>

    <!-- Share / link previews -->
    <meta property="og:site_name" content="TrufusionLabs" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="TrufusionLabs — Physician Portal" />
    <meta
      property="og:description"
      content="TrufusionLabs Physician Portal for research, current events, and products."
    />
    <meta property="og:image" content="/TrufusionLabs_PhysiciansPortal.png" />
    <meta property="og:image:alt" content="TrufusionLabs" />
    <meta property="og:image:width" content="1280" />
    <meta property="og:image:height" content="262" />
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="TrufusionLabs — Physician Portal" />
    <meta
      property="twitter:description"
      content="TrufusionLabs Physician Portal for research, current events, and products."
    />
    <meta property="twitter:image" content="/TrufusionLabs_PhysiciansPortal.png" />

    <!-- iOS / PWA -->
    <meta name="application-name" content="Physician Portal" />
    <meta name="apple-mobile-web-app-title" content="Physician Portal" />
    <meta name="theme-color" content="#3C67B7" />

    <script>
      (() => {
        try {
          const ensureHeadLink = (selector, attrs) => {
            const head = document.head || document.querySelector("head");
            if (!head) return;
            let link = document.querySelector(selector);
            if (!link) {
              link = document.createElement("link");
              head.appendChild(link);
            }
            Object.entries(attrs).forEach(([key, value]) => {
              if (typeof value === "string") link.setAttribute(key, value);
            });
          };

          const params = new URLSearchParams(window.location.search);
          const themeColor = document.querySelector('meta[name="theme-color"]');
          if (themeColor) themeColor.setAttribute("content", "#3C67B7");
          document.documentElement.dataset.brandColor = "blue";
          document.documentElement.style.setProperty("--primary", "rgb(60, 103, 183)");
          document.documentElement.style.setProperty("--primary-foreground", "#ffffff");
          document.documentElement.style.setProperty("--brand-color", "rgb(60, 103, 183)");
          document.documentElement.style.setProperty("--brand-color-rgb", "60, 103, 183");
          document.documentElement.style.setProperty("--brand-glass-rgb", "60, 103, 183");
          document.documentElement.style.setProperty("--secondary", "rgb(60, 103, 183)");
          document.documentElement.style.setProperty("--secondary-foreground", "#ffffff");

          const hasDelegateToken = Boolean((params.get("delegate") || "").trim());
          const title = hasDelegateToken ? "Physician Delegate" : "Physician Portal";
          document.title = title;

          const appName = document.querySelector('meta[name="application-name"]');
          if (appName) appName.setAttribute("content", title);
          const appleTitle = document.querySelector('meta[name="apple-mobile-web-app-title"]');
          if (appleTitle) appleTitle.setAttribute("content", title);

          const ogTitle = document.querySelector('meta[property="og:title"]');
          const twTitle = document.querySelector('meta[property="twitter:title"]');
          if (ogTitle) ogTitle.setAttribute("content", hasDelegateToken ? "TrufusionLabs — Physician Delegate" : "TrufusionLabs — Physician Portal");
          if (twTitle) twTitle.setAttribute("content", hasDelegateToken ? "TrufusionLabs — Physician Delegate" : "TrufusionLabs — Physician Portal");
        } catch (e) {
          // ignore
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
